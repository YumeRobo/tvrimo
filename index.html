<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>夢幻リモコン - ブログ極小エンタメ版</title>
    <style>
        /* ブログ埋め込み iframe に特化した超コンパクトレイアウト */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #121214;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 5px;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        .app-title {
            font-size: 14px;
            font-weight: bold;
            color: #00cae3;
            margin: 2px 0 6px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0,202,227,0.3);
        }

        /* 疑似テレビ画面（画像枠 ＆ 情報を超コンパクトに集約） */
        #tv-screen {
            width: 100%;
            max-width: 280px;
            height: 90px;
            background-color: #050505;
            border: 2px solid #2a2a2e;
            border-radius: 8px;
            margin-bottom: 6px;
            display: flex;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9);
            box-sizing: border-box;
            overflow: hidden;
        }
        #tv-screen.on {
            background-color: #152230;
            border-color: #3a4a5a;
        }

        /* 毎回変わる画像を表示する「小さな画像枠」 */
        #screen-image-box {
            width: 80px;
            height: 100%;
            background-color: #111;
            border-right: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        #screen-image-box::after {
            content: "NO SIGNAL";
            font-size: 9px;
            color: #444;
            font-weight: bold;
            display: block;
        }
        #tv-screen.on #screen-image-box::after {
            display: none;
        }

        /* テキスト表示エリア */
        .screen-info {
            flex: 1;
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        #brand-indicator {
            font-size: 9px;
            color: #777;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }
        #screen-text {
            font-size: 14px;
            font-weight: bold;
            color: #4cd964;
            margin: 2px 0;
        }
        #status-display {
            font-size: 10px;
            color: #007aff;
            height: 12px;
        }
        #input-indicator {
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 10px;
            color: #ff9500;
            font-weight: bold;
        }
        #signal-led {
            position: absolute;
            top: 6px;
            right: 8px;
            width: 5px;
            height: 5px;
            background-color: #222;
            border-radius: 50%;
        }
        #signal-led.flash {
            background-color: #ff3b30;
            box-shadow: 0 0 6px #ff3b30;
        }

        /* 機種設定パネル */
        .config-panel {
            width: 100%;
            max-width: 280px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222426;
            padding: 4px 8px;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .config-panel label {
            font-size: 10px;
            color: #aaa;
        }
        .config-panel select {
            background: #333;
            color: #fff;
            border: none;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            outline: none;
            cursor: pointer;
            max-width: 160px;
        }

        /* リモコン本体（縦を短く縮小） */
        .remote-control {
            width: 100%;
            max-width: 280px;
            background-color: #1e2022;
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.6);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* 最上段（電源・入力・メニューを1列に集約） */
        .row-top {
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }
        .btn-top-sub {
            background-color: #333;
            color: #ccc;
            font-size: 10px;
            flex: 1;
            padding: 6px 0;
        }
        .btn-power {
            background-color: #e53935;
            color: white;
            width: 50px;
            height: 26px;
            font-size: 10px;
            font-weight: bold;
        }

        /* 十字キーエリアのコンパクト化 */
        .dpad-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            background-color: #161719;
            padding: 4px;
            border-radius: 8px;
            align-items: center;
        }
        .btn-dpad {
            background-color: #2a2d30;
            padding: 6px 0;
            font-size: 11px;
        }
        .btn-center {
            background-color: #00cae3;
            color: #000;
        }

        /* 数字キーを3列から「4列」にして縦を圧縮 */
        .numeric-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }
        .btn-num {
            padding: 6px 0;
            font-size: 12px;
            background-color: #2d3033;
            border-radius: 4px;
        }
        .btn-num-mute {
            background-color: #424242;
            font-size: 10px;
        }

        /* 音量・選局を横一列にスリムに配置 */
        .control-row {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            background-color: #161719;
            padding: 4px 6px;
            border-radius: 8px;
        }
        .vol-ch-group {
            display: flex;
            align-items: center;
            gap: 4px;
            width: 48%;
        }
        .btn-label {
            font-size: 10px;
            color: #666;
            font-weight: bold;
            min-width: 20px;
        }
        .arrow-btn {
            flex: 1;
            padding: 5px 0;
            background-color: #2a2d30;
            font-size: 12px;
        }

        /* ボタン共通のタッチ調整 */
        button {
            color: #eaeaea;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: background-color 0.05s, transform 0.05s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        button:active {
            background-color: #4f5357 !important;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="app-title">夢幻リモコン</div>

    <div id="tv-screen">
        <div id="screen-image-box"></div>
        <div class="screen-info">
            <div id="brand-indicator">接続先: 未設定</div>
            <div id="screen-text">電源: OFF</div>
            <div id="status-display"></div>
            <div id="input-indicator"></div>
            <div id="signal-led"></div>
        </div>
    </div>

    <div class="config-panel">
        <label for="brand-select">機種設定:</label>
        <select id="brand-select" onchange="changeBrand()">
            <option value="SHARP">SHARP (AQUOS)</option>
            <option value="LT_32WSX_F1">シャープ (LT-32WSX-F1)</option>
            <option value="Sony_W730E">Sony (KJ-43W730E)</option>
            <option value="Panasonic">Panasonic (VIERA)</option>
            <option value="TOSHIBA">TOSHIBA (REGZA)</option>
        </select>
    </div>

    <div class="remote-control">
        <div class="row-top">
            <button class="btn-top-sub" onclick="pressButton('input')">入力切替</button>
            <button class="btn-top-sub" onclick="pressButton('menu', 'ホーム')">ホーム</button>
            <button class="btn-top-sub" onclick="pressButton('menu', '戻る')">戻る</button>
            <button class="btn-power" onclick="pressButton('power')">電源</button>
        </div>

        <div class="dpad-container">
            <button class="btn-dpad" onclick="pressButton('dpad', '左')">◀</button>
            <button class="btn-dpad" onclick="pressButton('dpad', '上')">▲</button>
            <button class="btn-dpad btn-center" onclick="pressButton('dpad', '決定')">決定</button>
            <button class="btn-dpad" onclick="pressButton('dpad', '下')">▼</button>
            <button class="btn-dpad" onclick="pressButton('dpad', '右')">▶</button>
        </div>

        <div class="numeric-grid">
            <button class="btn-num" onclick="pressButton('ch', 1)">1</button>
            <button class="btn-num" onclick="pressButton('ch', 2)">2</button>
            <button class="btn-num" onclick="pressButton('ch', 3)">3</button>
            <button class="btn-num" onclick="pressButton('ch', 4)">4</button>
            <button class="btn-num" onclick="pressButton('ch', 5)">5</button>
            <button class="btn-num" onclick="pressButton('ch', 6)">6</button>
            <button class="btn-num" onclick="pressButton('ch', 7)">7</button>
            <button class="btn-num" onclick="pressButton('ch', 8) || 8">8</button>
            <button class="btn-num" onclick="pressButton('ch', 9)">9</button>
            <button class="btn-num" onclick="pressButton('ch', 10)">10</button>
            <button class="btn-num" onclick="pressButton('ch', 11)">11</button>
            <button class="btn-num" onclick="pressButton('ch', 12)">12</button>
        </div>

        <div class="control-row">
            <div class="vol-ch-group">
                <span class="btn-label">音量</span>
                <button class="arrow-btn" onclick="pressButton('vol', -1)">－</button>
                <button class="arrow-btn" onclick="pressButton('vol', 1)">＋</button>
            </div>
            <button class="btn-num btn-num-mute" style="width: 45px; padding:0;" onclick="pressButton('mute')">消音</button>
            <div class="vol-ch-group">
                <span class="btn-label">選局</span>
                <button class="arrow-btn" onclick="pressButton('stepCh', -1)">∨</button>
                <button class="arrow-btn" onclick="pressButton('stepCh', 1)">∧</button>
            </div>
        </div>
    </div>

    <script>
        const tvState = {
            brand: "SHARP",
            isPowerOn: false,
            currentChannel: 1,
            volume: 12,
            isMuted: false,
            currentInput: "TV",
            maxVolume: 40,
            minVolume: 0,
            preMuteVolume: 12
        };

        const inputs = ["TV", "HDMI1", "HDMI2", "ビデオ"];

        // 追加・修正した赤外線信号シミュレートデータ
        const brandSignals = {
            SHARP: { protocol: "AEHA (48bit)", model: "AQUOS-汎用", customCode: "0x555A", data: "0x2181" },
            LT_32WSX_F1: { protocol: "AEHA (拡張)", model: "LT-32WSX-F1", customCode: "0x544D", data: "0xAA12" }, // 伝説の有機ELモニター仕様
            Sony_W730E: { protocol: "SONY-SIRC (15bit)", model: "KJ-43W730E", customCode: "0x114A", data: "0x00A5" },
            Panasonic: { protocol: "CCAM/MN6014", model: "VIERA-Gen", customCode: "0x3A01", data: "0x10BC" },
            TOSHIBA: { protocol: "NEC", model: "REGZA-Gen", customCode: "0x02FD", data: "0x40BF" }
        };

        const tvScreen = document.getElementById('tv-screen');
        const brandIndicator = document.getElementById('brand-indicator');
        const inputIndicator = document.getElementById('input-indicator');
        const signalLed = document.getElementById('signal-led');
        const screenText = document.getElementById('screen-text');
        const statusDisplay = document.getElementById('status-display');
        const brandSelect = document.getElementById('brand-select');
        const imageBox = document.getElementById('screen-image-box');

        let alertTimeout = null;

        window.addEventListener('DOMContentLoaded', () => {
            const savedBrand = localStorage.getItem('mugen_remote_brand');
            if (savedBrand && brandSignals[savedBrand]) {
                tvState.brand = savedBrand;
                brandSelect.value = savedBrand;
            }
            updateDisplay();
        });

        function changeBrand() {
            tvState.brand = brandSelect.value;
            localStorage.setItem('mugen_remote_brand', tvState.brand);
            flashLed();
            updateDisplay();
        }

        function flashLed() {
            signalLed.classList.add('flash');
            setTimeout(() => signalLed.classList.remove('flash'), 100);
            if (navigator.vibrate) navigator.vibrate(10);
        }

        // ボタンを押すごとに、100種類以上のAI生成アートや人物などの画像をランダム取得して飽きさせない
        function updateRandomImage() {
            if (tvState.isPowerOn) {
                // キャッシュを回避するため、ミリ秒タイムスタンプを付与して毎回確実に違う画像を表示
                const randomId = Math.floor(Math.random() * 1000);
                imageBox.style.backgroundImage = `url('https://picsum.photos/80/90?random=${randomId}')`;
            } else {
                imageBox.style.backgroundImage = 'none';
            }
        }

        function updateDisplay() {
            const sig = brandSignals[tvState.brand];
            brandIndicator.innerText = `送信先: ${sig.model}`;
            inputIndicator.innerText = tvState.isPowerOn ? tvState.currentInput : "";

            if (!tvState.isPowerOn) {
                tvScreen.classList.remove('on');
                screenText.innerText = "電源: OFF";
                statusDisplay.innerText = "";
                updateRandomImage();
            } else {
                tvScreen.classList.add('on');
                if (tvState.currentInput === "TV") {
                    screenText.innerText = `${tvState.currentChannel} ch`;
                } else {
                    screenText.innerText = `${tvState.currentInput}`;
                }

                if (tvState.isMuted) {
                    statusDisplay.innerText = "🔇 消音中";
                } else {
                    statusDisplay.innerText = `Vol: ${tvState.volume}`;
                }
            }
        }

        function showScreenAlert(message) {
            if (alertTimeout) clearTimeout(alertTimeout);
            statusDisplay.innerText = message;
            statusDisplay.style.color = "#ff9500";
            alertTimeout = setTimeout(() => {
                statusDisplay.style.color = "#007aff";
                updateDisplay();
            }, 2000);
        }

        function pressButton(action, value = null) {
            flashLed();
            
            // 毎回違う画像を表示するギミックを起動
            if (tvState.isPowerOn || action === 'power') {
                updateRandomImage();
            }

            const sig = brandSignals[tvState.brand];
            console.log(`%c[赤外線シグナル] ${sig.model} | ${sig.protocol} | カスタム:${sig.customCode} | コマンド:${action} ${value || ''}`, "color: #00cae3");

            if (action === 'power') {
                tvState.isPowerOn = !tvState.isPowerOn;
                updateDisplay();
                return;
            }

            if (!tvState.isPowerOn) return;

            switch (action) {
                case 'input':
                    let idx = inputs.indexOf(tvState.currentInput);
                    idx = (idx + 1) % inputs.length;
                    tvState.currentInput = inputs[idx];
                    updateDisplay();
                    break;
                case 'ch':
                    tvState.currentInput = "TV";
                    tvState.currentChannel = value;
                    updateDisplay();
                    break;
                case 'stepCh':
                    tvState.currentInput = "TV";
                    let nextCh = tvState.currentChannel + value;
                    if (nextCh > 12) nextCh = 1;
                    if (nextCh < 1) nextCh = 12;
                    tvState.currentChannel = nextCh;
                    updateDisplay();
                    break;
                case 'vol':
                    if (tvState.isMuted) tvState.isMuted = false;
                    let nextVol = tvState.volume + value;
                    if (nextVol >= tvState.minVolume && nextVol <= tvState.maxVolume) {
                        tvState.volume = nextVol;
                    }
                    updateDisplay();
                    break;
                case 'mute':
                    if (tvState.isMuted) {
                        tvState.volume = tvState.preMuteVolume;
                        tvState.isMuted = false;
                    } else {
                        tvState.preMuteVolume = tvState.volume;
                        tvState.isMuted = true;
                    }
                    updateDisplay();
                    break;
                case 'menu':
                    showScreenAlert(`[${value}]表示`);
                    break;
                case 'dpad':
                    showScreenAlert(`選択: ${value}`);
                    break;
            }
        }
    </script>
</body>
</html>
